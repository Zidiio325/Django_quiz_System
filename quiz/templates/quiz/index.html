<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資料結構測驗網站</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
            background-color: #f4f6f9;
            color: #333;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        select, button {
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            margin: 10px;
        }
        button {
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-primary { background-color: #007bff; color: white; width: 85%; }
        .btn-primary:hover { background-color: #0056b3; }
        .btn-danger { background-color: #dc3545; color: white; width: 85%; }
        .btn-danger:hover { background-color: #c82333; }
        .btn-info { background-color: #17a2b8; color: white; width: 85%; }
        .btn-info:hover { background-color: #138496; }
    </style>
</head>
<body>

    <div class="card">
        <h1>資料結構主題測驗網站</h1>
        <h2>第6章 堆疊(Stack)與佇列(Queue)</h2>

        <p>目前題庫總計：<strong>14</strong> 題選擇題</p>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <form action="{% url 'start_quiz' %}" method="POST">
            {% csrf_token %}

            <label for="num_questions" style="font-size: 18px; font-weight: bold;">請選擇本次測驗題數：</label>
            <br>
            <select name="num_questions" id="num_questions">
                <option value="5">📄 5 題（快速練習）</option>
                <option value="10">📄 10 題（標準測驗）</option>
                <option value="14">🔥 挑戰全部題目</option>
            </select>

            <br><br>
            <button type="submit" class="btn-primary">🚀 開始隨機測驗</button>
        </form>
    </div>

    <div class="card">
        <h3 style="margin-top: 0; color: #495057;">📊 學習工具專區</h3>

        <a href="{% url 'wrong_questions_book' %}" style="text-decoration: none;">
            <button type="button" class="btn-danger">📕 歷史錯題本專區</button>
        </a>

        <a href="{% url 'quiz_history' %}" style="text-decoration: none;">
            <button type="button" class="btn-info">📈 個人作答紀錄與歷程追蹤</button>
        </a>
    </div>

</body>
</html>
